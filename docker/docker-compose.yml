services:
  postgres:
    image: postgres:16-alpine
    container_name: delivery-monitor-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-delivery_monitor}
      POSTGRES_USER: ${DB_USER:-delivery_monitor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-delivery_monitor}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-delivery_monitor} -d ${DB_NAME:-delivery_monitor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    container_name: delivery-monitor-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-delivery_monitor}
      DB_USER: ${DB_USER:-delivery_monitor}
      DB_PASSWORD: ${DB_PASSWORD:-delivery_monitor}
      SERVER_PORT: 8080
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres-data:
