spring:
  application:
    name: delivery-monitor

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:delivery_monitor}
    username: ${DB_USER:delivery_monitor}
    password: ${DB_PASSWORD:delivery_monitor}

  jpa:
    open-in-view: false
    hibernate:
      # Schema is owned by Liquibase; Hibernate only validates it against entities.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}

# Jira REST client (Phase 2.1, docs/discovery.md §9.1). No sync/scheduler/persistence yet —
# only the HTTP client + auth wiring. Secrets come from env, never committed.
jira:
  base-url: ${JIRA_BASE_URL:https://jira.eltc.ru}
  connect-timeout: ${JIRA_CONNECT_TIMEOUT:5s}
  response-timeout: ${JIRA_RESPONSE_TIMEOUT:10s}
  project-keys: ${JIRA_PROJECT_KEYS:MPTPSUPP}
  board-id: ${JIRA_BOARD_ID:718}
  default-filter-id: ${JIRA_DEFAULT_FILTER_ID:30532}
  # JiraContextProvider data source (Phase 2.3): rest = real Jira, mock = in-memory sanitized
  # demo data for offline development. Default rest. Enable mock via the 'jira-mock' Spring
  # profile (see application-jira-mock.yml); mock is refused when a production profile is active.
  mode: ${JIRA_MODE:rest}
  # Jira sync (Phase 2.2) — application-layer orchestration over JiraContextProvider.
  sync:
    # Page size when paginating the board filter search. Operational setting, not hard-coded.
    page-size: ${JIRA_SYNC_PAGE_SIZE:50}
    # Background scheduler (Phase 2.5, JiraSyncScheduler). Disabled by default — manual sync
    # (POST /api/admin/sync/jira) stays the only trigger unless explicitly enabled
    # (docs/roadmap.md "manual sync first").
    enabled: ${JIRA_SYNC_ENABLED:false}
    # fixedDelay between the end of one scheduled run and the start of the next (never fixedRate).
    # Duration string, e.g. "5m", "90s", "PT5M".
    interval: ${JIRA_SYNC_INTERVAL:5m}
  auth:
    # bearer = Personal Access Token (Authorization: Bearer ...), recommended for Jira Server 8.14+.
    # basic  = HTTP Basic (username + password/PAT). Confirm which one the service account uses
    # (docs/discovery.md §1 "PAT vs basic auth on 8.20.30" is still TODO).
    type: ${JIRA_AUTH_TYPE:bearer}
    username: ${JIRA_USERNAME:}
    token: ${JIRA_TOKEN:}

# GitLab REST client (Phase 3.1, docs/discovery.md §9.2) + sync orchestration (Phase 3.2).
# HTTP client + PRIVATE-TOKEN auth + wire DTOs; sync.gitlab normalizes into snapshots.
# No persistence/scheduler/pipelines/controllers yet (docs/roadmap.md tasks 3.3+).
# Secrets from env, never committed. Mock mode allows a blank token (offline fixtures).
gitlab:
  base-url: ${GITLAB_BASE_URL:https://git.eltc.ru}
  connect-timeout: ${GITLAB_CONNECT_TIMEOUT:5s}
  response-timeout: ${GITLAB_RESPONSE_TIMEOUT:10s}
  # GitLabClient data source: rest = real GitLab API, mock = sanitized demo fixtures
  # (classpath:gitlab/mock/). Default rest. Enable mock via the 'gitlab-mock' Spring profile
  # (see application-gitlab-mock.yml); mock is refused when a production profile is active.
  mode: ${GITLAB_MODE:rest}
  # Project / Group / Personal Access Token → PRIVATE-TOKEN header. Required when mode=rest.
  token: ${GITLAB_TOKEN:}
  # GitLab sync — application-layer orchestration over GitLabClient + domain persistence.
  sync:
    # Page size (per_page) when paginating branches / commits / merge requests.
    page-size: ${GITLAB_SYNC_PAGE_SIZE:50}
    # Commit history depth → GitLab API `since` (docs/architecture.md Commit History Policy).
    # Full historical import is out of Phase 3.
    commit-history-days: ${GITLAB_SYNC_COMMIT_HISTORY_DAYS:30}
    # Background reconcile scheduler (Phase 3.9, GitLabSyncScheduler). Disabled by default —
    # manual sync (POST /api/admin/sync/gitlab) stays the only trigger unless explicitly enabled
    # (docs/roadmap.md "manual sync first").
    enabled: ${GITLAB_SYNC_ENABLED:false}
    # fixedDelay between the end of one scheduled run and the start of the next (never fixedRate).
    # Duration string, e.g. "10m", "90s", "PT10M".
    interval: ${GITLAB_SYNC_INTERVAL:10m}
    # Observed repo list for production (gitlab.mode=rest) comes from PostgreSQL
    # `repositories` via RepositoryPersistencePort (Phase 3.4.1 Single SoT) — not from yaml.
    # For mock/local, set gitlab.sync.repositories under profile `gitlab-mock`
    # (see application-gitlab-mock.yml).

# Minimal admin auth baseline (Phase 2.4, ADR-012). Gates POST /api/admin/** with a static Bearer
# token — stateless check, no user identity is derived from it (docs/security.md §2, §7).
# DELIVERY_MONITOR_ADMIN_TOKEN is a separate secret from JIRA_TOKEN (different trust boundaries,
# see ADR-012) and, like it, has no default value: never committed, fail-fast if unset.
delivery-monitor:
  admin:
    token: ${DELIVERY_MONITOR_ADMIN_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  info:
    build:
      enabled: true
